<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f0f14;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#151520;
position:sticky;
top:0;
}

nav h1{
color:#4da3ff;
}

nav a{
color:white;
margin-left:20px;
cursor:pointer;
text-decoration:none;
}

section{
padding:60px 10%;
display:none;
}

section.active{
display:block;
}

.hero{
text-align:center;
padding:120px 20px;
}

.hero h2{
font-size:48px;
margin-bottom:20px;
}

.hero p{
opacity:0.8;
margin-bottom:30px;
}

button{
padding:10px 20px;
border:none;
background:#4da3ff;
color:white;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1b1b2a;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
background:#1b1b2a;
border:none;
color:white;
border-radius:6px;
}

form{
max-width:500px;
margin:auto;
}

.profile-box{
background:#1b1b2a;
padding:20px;
border-radius:10px;
max-width:500px;
}

.admin{
max-width:800px;
margin:auto;
}

.notice{
position:fixed;
bottom:20px;
right:20px;
background:#4da3ff;
padding:10px 20px;
border-radius:6px;
display:none;
}

</style>
</head>

<body>

<nav>

<h1>DevPortfolio</h1>

<div>
<a onclick="showPage('home')">Главная</a>
<a onclick="showPage('projects')">Проекты</a>
<a onclick="showPage('order')">Заказать</a>
<a onclick="showPage('profile')">Профиль</a>
<a onclick="showPage('login')">Вход</a>
</div>

</nav>


<section id="home" class="active">

<div class="hero">

<h2>Разработчик сайтов и ботов</h2>

<p>Создаю сайты, Telegram-ботов и веб-приложения.</p>

<button onclick="showPage('projects')">Мои проекты</button>

</div>

</section>


<section id="projects">

<h2>Мои проекты</h2>

<br>

<input placeholder="Поиск..." oninput="searchProjects(this.value)">

<br><br>

<select onchange="filterProjects(this.value)">
<option value="all">Все</option>
<option value="site">Сайты</option>
<option value="bot">Боты</option>
<option value="app">Приложения</option>
</select>

<br><br>

<div class="grid" id="projectsGrid"></div>

</section>


<section id="order">

<h2>Заказать разработку</h2>

<br>

<form onsubmit="sendOrder(event)">

<input placeholder="Имя" required>

<input placeholder="Email" required>

<select required>
<option value="">Тип проекта</option>
<option>Сайт</option>
<option>Бот</option>
<option>Приложение</option>
</select>

<input placeholder="Бюджет">

<textarea placeholder="Описание проекта"></textarea>

<br><br>

<button>Отправить</button>

</form>

</section>


<section id="login">

<h2>Регистрация</h2>

<br>

<form onsubmit="register(event)">

<input id="regName" placeholder="Имя" required>
<input id="regEmail" placeholder="Email" required>
<input id="regPass" type="password" placeholder="Пароль" required>

<br><br>

<button>Зарегистрироваться</button>

</form>

<br><br>

<h2>Вход</h2>

<br>

<form onsubmit="login(event)">

<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Пароль">

<br><br>

<button>Войти</button>

</form>

</section>


<section id="profile">

<h2>Профиль</h2>

<br>

<div class="profile-box" id="profileBox"></div>

</section>


<section id="admin">

<h2>Админ панель</h2>

<br>

<div class="admin">

<h3>Пользователи</h3>
<div id="usersList"></div>

<br>

<h3>Заказы</h3>
<div id="ordersList"></div>

</div>

</section>


<div class="notice" id="notice"></div>


<script>

function showPage(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function notify(text){

let n=document.getElementById("notice")

n.innerText=text

n.style.display="block"

setTimeout(()=>n.style.display="none",2000)

}


let projects=[

{title:"Telegram Bot",type:"bot",desc:"Автоматический бот"},

{title:"Landing Page",type:"site",desc:"Современный сайт"},

{title:"Web App",type:"app",desc:"Приложение"}

]

function renderProjects(list){

let grid=document.getElementById("projectsGrid")

grid.innerHTML=""

list.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<h3>${p.title}</h3>

<p>${p.desc}</p>

<button onclick="notify('Открытие проекта')">Подробнее</button>

</div>

`

})

}

renderProjects(projects)

function searchProjects(q){

let f=projects.filter(p=>p.title.toLowerCase().includes(q.toLowerCase()))

renderProjects(f)

}

function filterProjects(t){

if(t=="all")renderProjects(projects)

else renderProjects(projects.filter(p=>p.type==t))

}

function register(e){

e.preventDefault()

let user={

name:regName.value,

email:regEmail.value,

pass:regPass.value,

date:new Date().toLocaleDateString()

}

localStorage.setItem("user",JSON.stringify(user))

notify("Регистрация успешна")

}

function login(e){

e.preventDefault()

let user=JSON.parse(localStorage.getItem("user"))

if(user && user.email==loginEmail.value && user.pass==loginPass.value){

localStorage.setItem("logged",true)

notify("Вы вошли")

loadProfile()

}else{

notify("Ошибка входа")

}

}

function loadProfile(){

let user=JSON.parse(localStorage.getItem("user"))

if(!user)return

profileBox.innerHTML=`

<h3>${user.name}</h3>

<p>${user.email}</p>

<p>Дата регистрации: ${user.date}</p>

<button onclick="logout()">Выйти</button>

`

}

function logout(){

localStorage.removeItem("logged")

notify("Вы вышли")

}

function sendOrder(e){

e.preventDefault()

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

orders.push({

date:new Date().toLocaleDateString()

})

localStorage.setItem("orders",JSON.stringify(orders))

notify("Заказ отправлен")

}

loadProfile()

</script>

</body>
</html>
