<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио разработчика</title>
    <style>
        /* ===== Глобальные переменные и сброс ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --accent: #00a8ff;
            --accent-hover: #0090e0;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --danger: #e94560;
            --success: #00cc88;
            --border: #2a2a4a;
            --shadow: 0 5px 15px rgba(0,0,0,0.5);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== Навигация ===== */
        .navbar {
            background-color: var(--bg-secondary);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            cursor: pointer;
            transition: var(--transition);
        }

        .logo:hover {
            text-shadow: 0 0 10px var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            padding: 0.5rem 0;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            color: var(--accent);
        }

        /* ===== Кнопки ===== */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background-color: var(--accent);
            color: white;
            font-size: 0.9rem;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,168,255,0.3);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-secondary:hover {
            background-color: var(--accent);
            color: white;
        }

        .btn-danger {
            background-color: var(--danger);
        }

        .btn-danger:hover {
            background-color: #c03040;
        }

        /* ===== Карточки проектов ===== */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .project-card {
            background-color: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,168,255,0.2);
        }

        .project-img {
            height: 200px;
            background: linear-gradient(45deg, var(--accent), #6a0dad);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }

        .project-content {
            padding: 1.5rem;
        }

        .project-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .project-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background-color: var(--accent);
            color: white;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        .project-desc {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* ===== Формы ===== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,168,255,0.1);
        }

        /* ===== Модальные окна ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            position: relative;
            box-shadow: var(--shadow);
            transform: translateY(-20px);
            transition: var(--transition);
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* ===== Уведомления ===== */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent);
            border-radius: 5px;
            box-shadow: var(--shadow);
            color: var(--text-primary);
            z-index: 1001;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        /* ===== Поиск и фильтры ===== */
        .search-bar {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .search-bar input,
        .search-bar select {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-primary);
        }

        /* ===== Адаптивность ===== */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                padding: 1rem;
            }
            .nav-links {
                margin: 1rem 0;
                flex-wrap: wrap;
                justify-content: center;
            }
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== Секции (страницы) ===== */
        .page {
            display: none;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page.active {
            display: block;
        }

        /* Главная страница */
        .hero {
            text-align: center;
            padding: 4rem 0;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Профиль */
        .profile-info {
            background-color: var(--bg-card);
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }

        .orders-list {
            list-style: none;
            margin-top: 1rem;
        }

        .orders-list li {
            padding: 1rem;
            background-color: var(--bg-secondary);
            border-radius: 5px;
            margin-bottom: 0.5rem;
        }

        /* Админка */
        .admin-section {
            margin-bottom: 2rem;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .admin-table th,
        .admin-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .admin-table th {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar">
        <div class="logo" onclick="showPage('home')">DevPortfolio</div>
        <div class="nav-links">
            <a href="#" onclick="showPage('home')">Главная</a>
            <a href="#" onclick="showPage('projects')">Проекты</a>
            <a href="#" onclick="showPage('order')">Заказать</a>
            <a href="#" id="profile-link" style="display:none;" onclick="showPage('profile')">Профиль</a>
            <a href="#" id="admin-link" style="display:none;" onclick="showPage('admin')">Админка</a>
            <a href="#" onclick="showPage('login')" id="login-link">Войти</a>
        </div>
        <div class="user-menu" id="user-menu" style="display:none;">
            <span class="user-name" id="user-name"></span>
            <button class="btn btn-secondary" onclick="logout()">Выйти</button>
        </div>
    </nav>

    <!-- Основной контейнер для страниц -->
    <main id="main-content"></main>

    <!-- Модальные окна -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Уведомления -->
    <div class="toast" id="toast"></div>

    <!-- Шаблоны страниц (скрыты) -->
    <div id="page-templates" style="display:none;">
        <!-- Главная -->
        <div id="home-page">
            <div class="hero">
                <h1>Привет, я разработчик</h1>
                <p>Создаю современные сайты, ботов и приложения. Более 5 лет опыта.</p>
                <div class="hero-buttons">
                    <button class="btn" onclick="showPage('projects')">Мои проекты</button>
                    <button class="btn" onclick="showPage('order')">Заказать разработку</button>
                    <button class="btn btn-secondary" onclick="showPage('profile')">О разработчике</button>
                    <button class="btn btn-secondary" onclick="showPage('login')">Войти / Регистрация</button>
                </div>
            </div>
        </div>

        <!-- Проекты (список) -->
        <div id="projects-page">
            <h1>Мои проекты</h1>
            <div class="search-bar">
                <input type="text" placeholder="Поиск проектов..." id="project-search">
                <select id="project-filter">
                    <option value="all">Все типы</option>
                    <option value="сайт">Сайты</option>
                    <option value="бот">Боты</option>
                    <option value="приложение">Приложения</option>
                </select>
            </div>
            <div class="projects-grid" id="projects-grid"></div>
        </div>

        <!-- Страница конкретного проекта (динамически) -->
        <div id="project-detail-page">
            <button class="btn btn-secondary" onclick="showPage('projects')">← Назад к проектам</button>
            <div id="project-detail-content"></div>
        </div>

        <!-- Заказ -->
        <div id="order-page">
            <h1>Заказать разработку</h1>
            <form id="order-form">
                <div class="form-group">
                    <label for="order-name">Имя</label>
                    <input type="text" id="order-name" required>
                </div>
                <div class="form-group">
                    <label for="order-email">Email</label>
                    <input type="email" id="order-email" required>
                </div>
                <div class="form-group">
                    <label for="order-type">Тип проекта</label>
                    <select id="order-type">
                        <option value="сайт">Сайт</option>
                        <option value="бот">Бот</option>
                        <option value="приложение">Приложение</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="order-budget">Бюджет</label>
                    <input type="number" id="order-budget" placeholder="₽" required>
                </div>
                <div class="form-group">
                    <label for="order-description">Описание проекта</label>
                    <textarea id="order-description" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Отправить заказ</button>
            </form>
        </div>

        <!-- Регистрация / Вход (комбинированное) -->
        <div id="login-page">
            <h1>Вход / Регистрация</h1>
            <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
                <div style="flex:1;">
                    <h2>Вход</h2>
                    <form id="login-form">
                        <div class="form-group">
                            <label for="login-email">Email</label>
                            <input type="email" id="login-email" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Пароль</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="btn">Войти</button>
                    </form>
                </div>
                <div style="flex:1;">
                    <h2>Регистрация</h2>
                    <form id="register-form">
                        <div class="form-group">
                            <label for="register-name">Имя</label>
                            <input type="text" id="register-name" required>
                        </div>
                        <div class="form-group">
                            <label for="register-email">Email</label>
                            <input type="email" id="register-email" required>
                        </div>
                        <div class="form-group">
                            <label for="register-password">Пароль</label>
                            <input type="password" id="register-password" required>
                        </div>
                        <button type="submit" class="btn">Зарегистрироваться</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Профиль пользователя -->
        <div id="profile-page">
            <h1>Профиль</h1>
            <div class="profile-info" id="profile-info"></div>
            <h2>Мои заказы</h2>
            <ul class="orders-list" id="profile-orders"></ul>
            <button class="btn btn-secondary" onclick="editProfile()">Редактировать профиль</button>
            <button class="btn btn-danger" onclick="logout()">Выйти</button>
        </div>

        <!-- Админ-панель -->
        <div id="admin-page">
            <h1>Админ-панель</h1>
            <div class="admin-section">
                <h2>Пользователи</h2>
                <table class="admin-table" id="admin-users"></table>
            </div>
            <div class="admin-section">
                <h2>Заказы</h2>
                <table class="admin-table" id="admin-orders"></table>
            </div>
        </div>
    </div>

    <script>
        // ===============================================
        // Глобальные данные и константы
        // ===============================================
        const ADMIN_EMAIL = 'admin@admin.com';
        const ADMIN_PASSWORD = 'admin';

        // Проекты (статическое портфолио)
        const projects = [
            { id: 1, title: 'Интернет-магазин', type: 'сайт', description: 'Полноценный интернет-магазин на React + Node.js', image: '🛒', details: 'Разработан интернет-магазин с корзиной, оплатой, админкой. Использованы React, Redux, Node.js, MongoDB.', features: ['Корзина', 'Оплата онлайн', 'Личный кабинет', 'Админ-панель'] },
            { id: 2, title: 'Telegram-бот для заказа еды', type: 'бот', description: 'Бот с каталогом и оплатой через Telegram Stars', image: '🤖', details: 'Бот позволяет выбирать блюда, оформлять заказ, оплачивать звездами. Использована библиотека aiogram.', features: ['Каталог', 'Корзина', 'Оплата звездами', 'Уведомления'] },
            { id: 3, title: 'Мобильное приложение для трекинга задач', type: 'приложение', description: 'Кроссплатформенное приложение на Flutter', image: '📱', details: 'Приложение для управления задачами с синхронизацией через Firebase.', features: ['Авторизация', 'Создание задач', 'Напоминания', 'Статистика'] },
            { id: 4, title: 'Сайт-портфолио', type: 'сайт', description: 'Одностраничный сайт с анимациями', image: '🎨', details: 'Современный сайт-портфолио с параллаксом и плавными анимациями.', features: ['Адаптивность', 'Анимации', 'Оптимизация SEO'] },
        ];

        // ===============================================
        // LocalStorage управление
        // ===============================================
        function getUsers() {
            return JSON.parse(localStorage.getItem('users')) || [];
        }

        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        function getOrders() {
            return JSON.parse(localStorage.getItem('orders')) || [];
        }

        function saveOrders(orders) {
            localStorage.setItem('orders', JSON.stringify(orders));
        }

        // Текущий пользователь (сессия)
        let currentUser = null;

        // ===============================================
        // Уведомления (тосты)
        // ===============================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (type === 'error') toast.style.borderLeftColor = 'var(--danger)';
            else toast.style.borderLeftColor = 'var(--accent)';
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ===============================================
        // Модальные окна
        // ===============================================
        function openModal(content) {
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // ===============================================
        // SPA: переключение страниц
        // ===============================================
        function showPage(page, param = null) {
            const main = document.getElementById('main-content');
            // Загружаем шаблон нужной страницы
            const template = document.getElementById(`${page}-page`);
            if (!template) return;
            main.innerHTML = template.innerHTML;

            // Обновляем активную ссылку в меню
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            const activeLink = document.querySelector(`[onclick*="'${page}'"]`);
            if (activeLink) activeLink.classList.add('active');

            // Вызываем инициализацию страницы
            if (page === 'projects') initProjectsPage();
            else if (page === 'project-detail' && param) showProjectDetail(param);
            else if (page === 'order') initOrderPage();
            else if (page === 'login') initLoginPage();
            else if (page === 'profile') initProfilePage();
            else if (page === 'admin') initAdminPage();

            // Прокрутка вверх
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===============================================
        // Проекты: отрисовка с поиском и фильтром
        // ===============================================
        function initProjectsPage() {
            const grid = document.getElementById('projects-grid');
            const searchInput = document.getElementById('project-search');
            const filterSelect = document.getElementById('project-filter');

            function renderProjects() {
                const searchTerm = searchInput.value.toLowerCase();
                const filter = filterSelect.value;
                const filtered = projects.filter(p => 
                    (filter === 'all' || p.type === filter) &&
                    (p.title.toLowerCase().includes(searchTerm) || p.description.toLowerCase().includes(searchTerm))
                );
                grid.innerHTML = filtered.map(p => `
                    <div class="project-card">
                        <div class="project-img">${p.image}</div>
                        <div class="project-content">
                            <h3 class="project-title">${p.title}</h3>
                            <span class="project-type">${p.type}</span>
                            <p class="project-desc">${p.description}</p>
                            <button class="btn" onclick="showPage('project-detail', ${p.id})">Подробнее</button>
                        </div>
                    </div>
                `).join('');
            }

            searchInput.addEventListener('input', renderProjects);
            filterSelect.addEventListener('change', renderProjects);
            renderProjects();
        }

        // Страница конкретного проекта
        function showProjectDetail(id) {
            const project = projects.find(p => p.id === id);
            if (!project) return;
            const main = document.getElementById('main-content');
            main.innerHTML = document.getElementById('project-detail-page').innerHTML;
            const content = document.getElementById('project-detail-content');
            content.innerHTML = `
                <h1>${project.title}</h1>
                <div style="font-size:4rem; text-align:center; margin:1rem 0;">${project.image}</div>
                <p><strong>Тип:</strong> ${project.type}</p>
                <p><strong>Описание:</strong> ${project.details}</p>
                <h3>Функции:</h3>
                <ul>${project.features.map(f => `<li>${f}</li>`).join('')}</ul>
                <button class="btn" onclick="alert('Ссылка на проект (демо)')">Открыть сайт</button>
                <button class="btn btn-secondary" onclick="showPage('projects')">Назад</button>
            `;
        }

        // ===============================================
        // Заказ
        // ===============================================
        function initOrderPage() {
            const form = document.getElementById('order-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const order = {
                    id: Date.now(),
                    name: document.getElementById('order-name').value,
                    email: document.getElementById('order-email').value,
                    type: document.getElementById('order-type').value,
                    budget: document.getElementById('order-budget').value,
                    description: document.getElementById('order-description').value,
                    date: new Date().toLocaleString(),
                };
                const orders = getOrders();
                orders.push(order);
                saveOrders(orders);
                showToast('Заказ отправлен!');
                form.reset();
            });
        }

        // ===============================================
        // Вход / Регистрация
        // ===============================================
        function initLoginPage() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                const users = getUsers();
                const user = users.find(u => u.email === email && u.password === password);
                if (user) {
                    currentUser = user;
                    updateUIAfterLogin();
                    showPage('profile');
                    showToast('Вход выполнен');
                } else if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                    // Администратор (не хранится в users)
                    currentUser = { email: ADMIN_EMAIL, name: 'Admin', isAdmin: true };
                    updateUIAfterLogin();
                    showPage('admin');
                    showToast('Вход как администратор');
                } else {
                    showToast('Неверный email или пароль', 'error');
                }
            });

            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('register-name').value;
                const email = document.getElementById('register-email').value;
                const password = document.getElementById('register-password').value;
                const users = getUsers();
                if (users.some(u => u.email === email)) {
                    showToast('Пользователь с таким email уже существует', 'error');
                    return;
                }
                const newUser = {
                    id: Date.now(),
                    name,
                    email,
                    password,
                    registered: new Date().toLocaleString(),
                };
                users.push(newUser);
                saveUsers(users);
                currentUser = newUser;
                updateUIAfterLogin();
                showPage('profile');
                showToast('Регистрация успешна');
            });
        }

        function updateUIAfterLogin() {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('profile-link').style.display = 'inline';
            document.getElementById('user-menu').style.display = 'flex';
            document.getElementById('user-name').textContent = currentUser.name || currentUser.email;
            if (currentUser.isAdmin) {
                document.getElementById('admin-link').style.display = 'inline';
            } else {
                document.getElementById('admin-link').style.display = 'none';
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('login-link').style.display = 'inline';
            document.getElementById('profile-link').style.display = 'none';
            document.getElementById('admin-link').style.display = 'none';
            document.getElementById('user-menu').style.display = 'none';
            showPage('home');
            showToast('Вы вышли');
        }

        // ===============================================
        // Профиль
        // ===============================================
        function initProfilePage() {
            if (!currentUser || currentUser.isAdmin) {
                showPage('login');
                return;
            }
            const infoDiv = document.getElementById('profile-info');
            infoDiv.innerHTML = `
                <p><strong>Имя:</strong> ${currentUser.name}</p>
                <p><strong>Email:</strong> ${currentUser.email}</p>
                <p><strong>Дата регистрации:</strong> ${currentUser.registered || 'не указана'}</p>
            `;
            const orders = getOrders().filter(o => o.email === currentUser.email);
            const ordersList = document.getElementById('profile-orders');
            if (orders.length === 0) {
                ordersList.innerHTML = '<li>Нет заказов</li>';
            } else {
                ordersList.innerHTML = orders.map(o => `
                    <li>
                        <strong>${o.name}</strong> (${o.type}) - ${o.budget} ₽<br>
                        <small>${o.description}</small><br>
                        <em>${o.date}</em>
                    </li>
                `).join('');
            }
        }

        function editProfile() {
            const newName = prompt('Введите новое имя', currentUser.name);
            if (newName && newName !== currentUser.name) {
                const users = getUsers();
                const userIndex = users.findIndex(u => u.email === currentUser.email);
                if (userIndex !== -1) {
                    users[userIndex].name = newName;
                    saveUsers(users);
                    currentUser.name = newName;
                    document.getElementById('user-name').textContent = newName;
                    showToast('Профиль обновлён');
                    initProfilePage();
                }
            }
        }

        // ===============================================
        // Админ-панель
        // ===============================================
        function initAdminPage() {
            if (!currentUser || !currentUser.isAdmin) {
                showPage('home');
                return;
            }
            const usersTable = document.getElementById('admin-users');
            const ordersTable = document.getElementById('admin-orders');

            function renderUsers() {
                const users = getUsers();
                usersTable.innerHTML = `
                    <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Дата</th><th>Действия</th></tr></thead>
                    <tbody>
                        ${users.map(u => `
                            <tr>
                                <td>${u.id}</td>
                                <td>${u.name}</td>
                                <td>${u.email}</td>
                                <td>${u.registered || ''}</td>
                                <td><button class="btn btn-danger" onclick="deleteUser(${u.id})">Удалить</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                `;
            }

            function renderOrders() {
                const orders = getOrders();
                ordersTable.innerHTML = `
                    <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Тип</th><th>Бюджет</th><th>Дата</th><th>Действия</th></tr></thead>
                    <tbody>
                        ${orders.map(o => `
                            <tr>
                                <td>${o.id}</td>
                                <td>${o.name}</td>
                                <td>${o.email}</td>
                                <td>${o.type}</td>
                                <td>${o.budget}</td>
                                <td>${o.date}</td>
                                <td><button class="btn btn-danger" onclick="deleteOrder(${o.id})">Удалить</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                `;
            }

            renderUsers();
            renderOrders();
        }

        function deleteUser(id) {
            let users = getUsers();
            users = users.filter(u => u.id !== id);
            saveUsers(users);
            showToast('Пользователь удалён');
            initAdminPage();
        }

        function deleteOrder(id) {
            let orders = getOrders();
            orders = orders.filter(o => o.id !== id);
            saveOrders(orders);
            showToast('Заказ удалён');
            initAdminPage();
        }

        // ===============================================
        // Инициализация при загрузке
        // ===============================================
        document.addEventListener('DOMContentLoaded', () => {
            // Проверяем, был ли сохранён текущий пользователь в сессии (например, через sessionStorage)
            // Для простоты не сохраняем, но можно добавить.
            showPage('home');
        });

        // Экспорт в глобальную область для onclick
        window.showPage = showPage;
        window.closeModal = closeModal;
        window.logout = logout;
        window.editProfile = editProfile;
        window.deleteUser = deleteUser;
        window.deleteOrder = deleteOrder;
    </script>
</body>
</html>
